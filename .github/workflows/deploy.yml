name: Deploy to cPanel (FTPS)

# Build the Vite site and upload dist/ to cPanel shared hosting over FTPS.
on:
  push:
    branches: [master]
  workflow_dispatch: # allows manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to cPanel via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: ${{ vars.FTP_PORT || '21' }}
          # Only the built site is uploaded.
          local-dir: ./dist/
          # Web root on the host. If your FTP user already lands inside the web
          # root, set repo variable FTP_SERVER_DIR to "./" instead.
          server-dir: ${{ vars.FTP_SERVER_DIR || 'public_html/' }}
          # Keeps a sync-state file on the server so only changed files upload.
          # Set to true once if you ever need to force a full re-upload.
          dangerous-clean-slate: false
