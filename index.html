<!doctype html>
<html lang="hu" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Life Protocol élő esemény Budapesten, október közepén. Funkcionális és biofizikai protokollok a sejtszintű regenerációért — Victor C. Fields és az LP szakértői csapata. Jegyek: Early Bird, Normál, VIP."
    />
    <meta name="theme-color" content="#005974" />

    <!-- Prevent dark-mode flash: set class before paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('lp-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Life Protocol — Élő Esemény · Budapest, október</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
